<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能文档工厂 - 批量证书生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .card h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-secondary {
            background: #f5f5f5;
            color: #333;
            border: 2px solid #ddd;
        }
        
        .btn-secondary:hover {
            background: #e8e8e8;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }
        
        .upload-area {
            border: 3px dashed #ddd;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            transition: border-color 0.3s, background 0.3s;
            cursor: pointer;
        }
        
        .upload-area:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        
        .upload-area .icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .upload-area p {
            color: #666;
            margin-bottom: 10px;
        }
        
        .upload-area .hint {
            color: #999;
            font-size: 13px;
        }
        
        .divider {
            display: flex;
            align-items: center;
            margin: 30px 0;
            color: #999;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #ddd;
        }
        
        .divider span {
            padding: 0 15px;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .message {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .message.show {
            display: block;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .feature {
            text-align: center;
            padding: 20px;
        }
        
        .feature .icon {
            font-size: 36px;
            margin-bottom: 10px;
        }
        
        .feature h3 {
            color: #333;
            margin-bottom: 5px;
        }
        
        .feature p {
            color: #666;
            font-size: 14px;
        }
        
        footer {
            text-align: center;
            color: rgba(255,255,255,0.7);
            margin-top: 30px;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>智能文档工厂</h1>
            <p>批量证书生成工具 - 一键生成，高效便捷</p>
        </div>
        
        <div class="card">
            <h2>方式一：手动输入</h2>
            <div id="manual-message" class="message"></div>
            <form id="manual-form">
                <div class="form-group">
                    <label for="names">获奖人员姓名（每行一个）</label>
                    <textarea id="names" name="names" placeholder="张三&#10;李四&#10;王五" required></textarea>
                </div>
                
                <div class="form-group">
                    <label for="event">活动/奖项名称</label>
                    <input type="text" id="event" name="event" value="2026年度优秀员工评选" required>
                </div>
                
                <div class="form-group">
                    <label for="organization">颁发单位</label>
                    <input type="text" id="organization" name="organization" value="XX科技有限公司" required>
                </div>
                
                <div class="form-group">
                    <label for="date">颁发日期</label>
                    <input type="text" id="date" name="date" value="2026年03月29日">
                </div>
                
                <button type="submit" class="btn">生成证书</button>
            </form>
            
            <div id="manual-loading" class="loading">
                <div class="spinner"></div>
                <p>正在生成证书，请稍候...</p>
            </div>
        </div>
        
        <div class="divider"><span>或者</span></div>
        
        <div class="card">
            <h2>方式二：上传Excel文件</h2>
            <div id="upload-message" class="message"></div>
            <form id="upload-form" enctype="multipart/form-data">
                <div class="upload-area" onclick="document.getElementById('file').click()">
                    <div class="icon">📊</div>
                    <p>点击上传Excel文件</p>
                    <p class="hint">支持 .xlsx 格式，需包含：姓名、活动、颁发单位 列</p>
                </div>
                <input type="file" id="file" name="file" accept=".xlsx,.xls" style="display: none;" required>
                <p id="filename" style="margin-top: 10px; color: #667eea; text-align: center;"></p>
                <button type="submit" class="btn btn-secondary" style="margin-top: 20px;">上传并生成</button>
            </form>
            
            <div id="upload-loading" class="loading">
                <div class="spinner"></div>
                <p>正在处理文件，请稍候...</p>
            </div>
        </div>
        
        <div class="card">
            <div class="features">
                <div class="feature">
                    <div class="icon">⚡</div>
                    <h3>快速生成</h3>
                    <p>一键批量生成，省时省力</p>
                </div>
                <div class="feature">
                    <div class="icon">📄</div>
                    <h3>专业模板</h3>
                    <p>精美证书模板，即开即用</p>
                </div>
                <div class="feature">
                    <div class="icon">🔒</div>
                    <h3>数据安全</h3>
                    <p>本地处理，不上传服务器</p>
                </div>
            </div>
        </div>
        
        <footer>
            <p>智能文档工厂 © 2026 | 让文档处理更简单</p>
        </footer>
    </div>
    
    <script>
        // 文件选择显示
        document.getElementById('file').addEventListener('change', function() {
            const filename = this.files[0]?.name || '';
            document.getElementById('filename').textContent = filename ? '已选择: ' + filename : '';
        });
        
        // 手动输入表单提交
        document.getElementById('manual-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const loading = document.getElementById('manual-loading');
            const message = document.getElementById('manual-message');
            
            loading.classList.add('show');
            message.classList.remove('show');
            
            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'certificates.zip';
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    a.remove();
                    
                    message.textContent = '证书生成成功！正在下载...';
                    message.className = 'message success show';
                } else {
                    const data = await response.json();
                    message.textContent = data.error || '生成失败';
                    message.className = 'message error show';
                }
            } catch (error) {
                message.textContent = '网络错误，请重试';
                message.className = 'message error show';
            } finally {
                loading.classList.remove('show');
            }
        });
        
        // 文件上传表单提交
        document.getElementById('upload-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const loading = document.getElementById('upload-loading');
            const message = document.getElementById('upload-message');
            
            if (!document.getElementById('file').files[0]) {
                message.textContent = '请选择文件';
                message.className = 'message error show';
                return;
            }
            
            loading.classList.add('show');
            message.classList.remove('show');
            
            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'certificates.zip';
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    a.remove();
                    
                    message.textContent = '证书生成成功！正在下载...';
                    message.className = 'message success show';
                } else {
                    const data = await response.json();
                    message.textContent = data.error || '生成失败';
                    message.className = 'message error show';
                }
            } catch (error) {
                message.textContent = '网络错误，请重试';
                message.className = 'message error show';
            } finally {
                loading.classList.remove('show');
            }
        });
    </script>
</body>
</html>
